kind = "web"
previewPath = "/"
title = "MAWIBO — Super Health Ecosystem"
version = "1.0.0"
id = "artifacts/mawibo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25373

[services.development]
run = "pnpm --filter @workspace/mawibo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mawibo", "run", "build" ]
publicDir = "artifacts/mawibo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25373"
BASE_PATH = "/"
