name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10"

jobs:
  # ─── Install & cache dependencies ───────────────────────────────────────────
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

  # ─── Type checking ──────────────────────────────────────────────────────────
  typecheck:
    name: Type check
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run typecheck (libs)
        run: pnpm run typecheck:libs

      - name: Run typecheck (artifacts)
        run: pnpm -r --filter "./artifacts/**" --if-present run typecheck

  # ─── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build
    needs: install
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      # Use dummy values so vite.config.ts doesn't error during build
      DATABASE_URL: postgresql://user:pass@localhost:5432/mawibo
      OPENAI_API_KEY: sk-placeholder
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter @workspace/mawibo run build

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: artifacts/mawibo/dist/public
          retention-days: 7

      - name: Upload API build artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: artifacts/api-server/dist
          retention-days: 7

  # ─── Deployment readiness check ─────────────────────────────────────────────
  deployment-check:
    name: Deployment readiness
    needs: [typecheck, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check .env.example exists
        run: test -f .env.example

      - name: Check vercel.json exists
        run: test -f vercel.json

      - name: Check no secrets in source
        run: |
          # Fail if any real API key patterns appear in source
          if grep -rE "(sk-[a-zA-Z0-9]{20,}|password\s*=\s*['\"][^'\"]{8,})" \
              artifacts/mawibo/src artifacts/api-server/src \
              --include="*.ts" --include="*.tsx" 2>/dev/null; then
            echo "::error::Possible hardcoded secret detected in source files"
            exit 1
          fi
          echo "✅ No hardcoded secrets found"

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: artifacts/mawibo/dist/public

      - name: Verify frontend output
        run: |
          test -f artifacts/mawibo/dist/public/index.html
          echo "✅ Frontend build output verified"
          ls -lah artifacts/mawibo/dist/public/
